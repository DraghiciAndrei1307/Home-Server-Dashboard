<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Server 3D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: sans-serif;
        }

        /* Scena 3D va sta pe tot ecranul, în fundal */
        spline-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Interfața ta cu butoane va sta deasupra scenei 3D */
        .ui-container {
            position: relative;
            z-index: 2;
            pointer-events: none; /* Lasă mouse-ul să treacă prin fundal pentru a roti scena 3D */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 50px;
            color: white;
        }

        .btn {
            pointer-events: auto; /* Butoanele rămân clickabile */
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 8px;
            text-decoration: none;
            transition: background 0.3s;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.9.0/build/spline-viewer.js"></script>

    <spline-viewer url="https://prod.spline.design/HT16Z8hqtzHc02tK/scene.splinecode"></spline-viewer>

    <div class="ui-container">
        <h1>Serverul Meu Web 3D</h1>
        <p>Alege serviciul dorit:</p>
        <div style="margin-top: 20px;">
            <a href="http://IP-SERVER:4533" class="btn">🎵 Navidrome</a>
            <a href="http://IP-SERVER:8080" class="btn">📄 Stirling PDF</a>
        </div>
    </div>

</body>
</html>
